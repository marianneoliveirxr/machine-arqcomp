<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marianne's Machine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <center>

        <h1>Marianne's Machine</h1>

        <h2 class="subtitulo">Conversor para divas programadoras 💖</h2>

        <div class="lado-esquerdo">
            <img src="img/imagem3.jpg" alt="">
            <img src="img/imagem4.jpg" alt="">
            <img src="img/imagem2.jpg" alt="">
        </div>

        <div class="lado-direito">
            <img src="img/imagem1.jpg" alt="diva 1">
            <img src="img/imagem5.jpg" alt="diva 2">
            <img src="img/imagem6.jpg" alt="">
        </div>

        <h3 class="titulos">Digite um número decimal:</h3>
        <input id="demo1" type="text" placeholder="Ex: 42">
        <br><br>

        <button onclick="converter()">Converter</button>

        <h3 class="titulo2">Resultados:</h3>
        <p class="subtitulo2">Octal:
        <div id="demo2"></div>
        </p>
        <p class="subtitulo2">Hexadecimal:
        <div id="demo3"></div>
        </p>
        <p class="subtitulo2">Binário:
        <div id="demo4"></div>
        </p>
    </center>

    <script>
        function converter() {
            var decimal = Number(demo1.value);

            demo2.innerHTML = decimal.toString(8);
            demo3.innerHTML = decimal.toString(16);
            demo4.innerHTML = decimal.toString(2);
        }
    </script>
</body>

</html>
